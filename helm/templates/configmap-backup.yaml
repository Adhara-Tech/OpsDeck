{{- if .Values.backup.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "opsdeck.fullname" . }}-backup-script
  labels:
    {{- include "opsdeck.labels" . | nindent 4 }}
data:
  backup.sh: |
    #!/bin/sh
    set -e

    DUMP_DIR="/backup/database"
    FILES_DIR="/backup/files"
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    DUMP_FILE="${DUMP_DIR}/opsdeck-${TIMESTAMP}.sql.gz"

    echo "=== OpsDeck Backup - ${TIMESTAMP} ==="

    # --- 1. Initialize restic repo if needed ---
    echo "[1/4] Checking restic repository..."
    restic snapshots > /dev/null 2>&1 || {
      echo "  Repository not found, initializing..."
      restic init
    }

    # --- 2. Database dump ---
    echo "[2/4] Dumping database..."
    mkdir -p "${DUMP_DIR}"
    # Clean previous dumps (we only keep the latest in the staging dir)
    rm -f "${DUMP_DIR}"/*.sql.gz
    pg_dump "${DATABASE_URL}" | gzip > "${DUMP_FILE}"
    DUMP_SIZE=$(du -h "${DUMP_FILE}" | cut -f1)
    echo "  Dump complete: ${DUMP_FILE} (${DUMP_SIZE})"

    # --- 3. Backup both paths in a single snapshot ---
    echo "[3/4] Sending to restic..."
    restic backup "${DUMP_DIR}" "${FILES_DIR}" \
      --tag opsdeck \
      --tag "db-${TIMESTAMP}"

    # --- 4. Apply retention policy ---
    echo "[4/4] Applying retention policy..."
    restic forget \
      --keep-daily {{ .Values.backup.retention.keepDaily }} \
      --keep-weekly {{ .Values.backup.retention.keepWeekly }} \
      --keep-monthly {{ .Values.backup.retention.keepMonthly }} \
      --prune

    echo "=== Backup complete ==="
{{- end -}}
