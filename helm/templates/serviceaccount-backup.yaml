{{- if and .Values.backup.enabled .Values.backup.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.backup.serviceAccount.name | default (printf "%s-backup" (include "opsdeck.fullname" .)) }}
  labels:
    {{- include "opsdeck.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
  {{- with .Values.backup.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}
