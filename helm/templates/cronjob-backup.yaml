{{- if .Values.backup.enabled -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "opsdeck.fullname" . }}-backup
  labels:
    {{- include "opsdeck.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "opsdeck.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}"
              command: ["sh", "/scripts/backup.sh"]
              env:
                # --- Database connection ---
                {{- if eq .Values.database.type "internal" }}
                - name: DATABASE_URL
                  value: postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "opsdeck.fullname" . }}-db:5432/{{ .Values.postgresql.auth.database }}
                {{- else if eq .Values.database.type "external" }}
                - name: DB_PASSWORD_RAW
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.database.external.existingSecret.name }}
                      key: {{ .Values.database.external.existingSecret.key }}
                - name: DATABASE_URL
                  value: postgresql://{{ .Values.database.external.username }}:$(DB_PASSWORD_RAW)@{{ .Values.database.external.host }}:{{ .Values.database.external.port }}/{{ .Values.database.external.database }}
                {{- end }}
                # --- Restic config (from user-managed Secret) ---
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.existingSecret }}
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.existingSecret }}
                      key: RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.existingSecret }}
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.existingSecret }}
                      key: AWS_SECRET_ACCESS_KEY
              volumeMounts:
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
                - name: files
                  mountPath: /backup/files
                  readOnly: true
                - name: database-staging
                  mountPath: /backup/database
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
          volumes:
            - name: backup-script
              configMap:
                name: {{ include "opsdeck.fullname" . }}-backup-script
                defaultMode: 0755
            - name: files
              persistentVolumeClaim:
                {{- if .Values.persistence.attachments.existingClaim }}
                claimName: {{ .Values.persistence.attachments.existingClaim }}
                {{- else }}
                claimName: {{ include "opsdeck.fullname" . }}-attachments-pvc
                {{- end }}
            - name: database-staging
              emptyDir: {}
{{- end -}}
