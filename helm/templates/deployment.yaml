apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsdeck.fullname" . }}
  labels:
    {{- include "opsdeck.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "opsdeck.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opsdeck.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          
          env:
            # --- 1. Lógica de Selección de Base de Datos ---
            
            # OPCIÓN A: Postgres Interno (Kubernetes Service)
            {{- if eq .Values.database.type "internal" }}
            - name: DATABASE_URL
              value: postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "opsdeck.fullname" . }}-db:5432/{{ .Values.postgresql.auth.database }}
            
            # OPCIÓN B: Postgres Externo (Aurora, RDS, etc)
            {{- else if eq .Values.database.type "external" }}
            # 1. Inyectamos el password como variable de entorno oculta
            - name: DB_PASSWORD_RAW
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.external.existingSecret.name }}
                  key: {{ .Values.database.external.existingSecret.key }}
            
            # 2. Usamos esa variable para construir la URI
            - name: DATABASE_URL
              value: postgresql://{{ .Values.database.external.username }}:$(DB_PASSWORD_RAW)@{{ .Values.database.external.host }}:{{ .Values.database.external.port }}/{{ .Values.database.external.database }}
            
            # OPCIÓN C: SQLite (Local)
            # Forzamos la ruta a /data/renewals.db para usar el volumen persistente
            {{- else if eq .Values.database.type "sqlite" }}
            - name: DATABASE_URL
              {{- if .Values.database.sqlite.persistence.enabled }}
              value: sqlite:////app/data/renewals.db
              {{- else }}
              value: sqlite:////app/data/renewals.db
              {{- end }}
            {{- end }}
            
            # --- 2. Variables de Entorno Extra (values.yaml) ---
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

          # --- 3. Secretos Externos ---
          {{- if .Values.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret }}
          {{- end }}

          # --- 3.1 Logging Sidecar ---
          {{- if .Values.loggingSidecar.enabled }}
        - name: filebeat-sidecar
          image: "{{ .Values.loggingSidecar.image.repository }}:{{ .Values.loggingSidecar.image.tag }}"
          imagePullPolicy: {{ .Values.loggingSidecar.image.pullPolicy }}
          args: [
            "-c", "/usr/share/filebeat/filebeat.yml",
            "-e",
          ]
          env:
            - name: ELASTICSEARCH_HOST
              value: "{{ .Values.loggingSidecar.elasticsearch.host }}"
            - name: ELASTICSEARCH_PORT
              value: "{{ .Values.loggingSidecar.elasticsearch.port }}"
            - name: ELASTICSEARCH_USERNAME
              value: "{{ .Values.loggingSidecar.elasticsearch.username }}"
            - name: ELASTICSEARCH_PASSWORD
              value: "{{ .Values.loggingSidecar.elasticsearch.password }}"
          volumeMounts:
            - name: logging-config
              mountPath: /usr/share/filebeat/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
            - name: logs
              mountPath: /app/logs
              readOnly: true
          {{- end }}

          # --- 4. Health Checks ---
          # All probes use TCP socket check to avoid HTTP/HTTPS scheme issues
          # Startup probe: verifies port is listening (up to 5 minutes: 60 * 5s = 300s)
          startupProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          
          # Liveness probe: only starts checking AFTER startup probe succeeds
          livenessProbe:
            tcpSocket:
              port: 5000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe: only starts checking AFTER startup probe succeeds
          readinessProbe:
            tcpSocket:
              port: 5000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi

          # --- 5. Montaje de Volúmenes ---
          volumeMounts:
            # SQLite database (if enabled)
            {{- if and (eq .Values.database.type "sqlite") .Values.database.sqlite.persistence.enabled }}
            - name: sqlite-data
              mountPath: /data
            {{- end }}
            
            # Logs folder
            {{- if .Values.persistence.logs.enabled }}
            - name: logs
              mountPath: /app/logs
            {{- end }}
            
            # Attachments folder
            {{- if .Values.persistence.attachments.enabled }}
            - name: attachments
              mountPath: /app/data/attachments
            {{- end }}

      # --- 6. Definición de Volúmenes ---
      volumes:
        # SQLite PVC
        {{- if and (eq .Values.database.type "sqlite") .Values.database.sqlite.persistence.enabled }}
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ include "opsdeck.fullname" . }}-sqlite-pvc
        {{- end }}
        
        # Logs PVC
        {{- if .Values.persistence.logs.enabled }}
        - name: logs
          persistentVolumeClaim:
            {{- if .Values.persistence.logs.existingClaim }}
            claimName: {{ .Values.persistence.logs.existingClaim }}
            {{- else }}
            claimName: {{ include "opsdeck.fullname" . }}-logs-pvc
            {{- end }}
        {{- end }}
        
        # Attachments PVC
        {{- if .Values.persistence.attachments.enabled }}
        - name: attachments
          persistentVolumeClaim:
            {{- if .Values.persistence.attachments.existingClaim }}
            claimName: {{ .Values.persistence.attachments.existingClaim }}
            {{- else }}
            claimName: {{ include "opsdeck.fullname" . }}-attachments-pvc
            {{- end }}
        {{- end }}

        # Logging Sidecar Config Map
        {{- if .Values.loggingSidecar.enabled }}
        - name: logging-config
          configMap:
            name: {{ include "opsdeck.fullname" . }}-logging-config
        {{- end }}


