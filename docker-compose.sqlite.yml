# docker-compose.sqlite.yml
# Use this file for SQLite deployments: docker compose -f docker-compose.sqlite.yml up
services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./data/attachments:/app/data/attachments
    environment:
      - DATABASE_URL=sqlite:////app/data/renewals.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FLASK_DEBUG=1
      - OAUTHLIB_INSECURE_TRANSPORT=1
      - ENTERPRISE_ENABLED=${ENTERPRISE_ENABLED:-False}
    env_file:
      - .env
