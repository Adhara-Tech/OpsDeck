name: Python CI Test Suite

#
# Triggers the workflow on commits to any pull request.
#
on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code so the runner can access it
      - name: Check out repository code
        uses: actions/checkout@v4

      # Step 2: Set up Python. I'm using 3.11 to match your Dockerfile.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies (production + dev/test)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Step 4: Security Check (Trivy)
      # Scans the filesystem for vulnerabilities in library dependencies (requirements.txt).
      # It will ONLY fail the build (exit-code 1) if HIGH or CRITICAL severities are found.
      - name: Security Check (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1' # Fail the pipeline if vulns are found
          severity: 'CRITICAL,HIGH' # Only look for these severities

      # Step 5: Run unit tests (SQLite in-memory, no DB required)
      - name: Run unit tests
        env:
          PYTHONPATH: ./src
        run: |
          pytest --disable-warnings --ignore=tests/test_migrations.py

  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opsdeck
          POSTGRES_PASSWORD: opsdeck
          POSTGRES_DB: opsdeck_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opsdeck -d opsdeck_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migration tests
        env:
          DATABASE_URL: postgresql://opsdeck:opsdeck@localhost:5432/opsdeck_test
          PYTHONPATH: ./src
        run: |
          pytest tests/test_migrations.py -v
