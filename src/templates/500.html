{% extends "layout.html" %}

{% block title %}Internal Server Error - OpsDeck{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="text-center" style="margin-top: 100px;">
        <div class="error mx-auto mb-4" style="font-size: 7rem; font-weight: 700; color: #e74a3b;">500</div>
        <p class="lead text-gray-800 mb-4">Internal Server Error</p>
        <p class="text-gray-500 mb-5">
            <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i><br>
            Oops! Something went wrong on our end.<br>
            Our team has been notified and is working on it.
        </p>
        <a href="{{ url_for('risk.dashboard') }}" class="btn btn-primary">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
