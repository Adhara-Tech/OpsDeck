{% extends 'layout.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title mb-0">New Risk Assessment</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Assessment Name</label>
                        <input type="text" class="form-control" id="name" name="name"
                            placeholder="e.g., Q1 2024 Strategic Assessment" required>
                        <div class="form-text">A descriptive name to identify this snapshot in time.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Snapshot Strategy</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="include_risks" id="import_yes"
                                value="yes" checked>
                            <label class="form-check-label" for="import_yes">
                                <strong>Snaphot All Open Risks (Recommended)</strong><br>
                                <small class="text-muted">Import all currently open risks and freeze their
                                    state.</small>
                            </label>
                        </div>
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="radio" name="include_risks" id="import_no" value="no">
                            <label class="form-check-label" for="import_no">
                                <strong>Start Empty</strong><br>
                                <small class="text-muted">Create a blank assessment and add items manually
                                    later.</small>
                            </label>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Create Assessment</button>
                        <a href="{{ url_for('risk_assessment.list_assessments') }}"
                            class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
