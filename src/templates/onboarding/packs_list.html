{% extends "layout.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1><i class="fas fa-boxes text-primary me-2"></i>Profile Management</h1>
    <a href="{{ url_for('onboarding.index') }}" class="btn btn-outline-secondary">Back to Dashboard</a>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="list-group list-group-flush">
                {% for pack in packs %}
                <a href="{{ url_for('onboarding.pack_detail', id=pack.id) }}"
                    class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
                    <div>
                        <h5 class="mb-1 text-primary">{{ pack.name }}</h5>
                        <small class="text-muted">{{ pack.description or 'No description' }}</small>
                    </div>
                    <span class="badge bg-secondary rounded-pill">{{ pack.items|length }} items</span>
                </a>
                {% else %}
                <div class="list-group-item text-center py-5 text-muted">
                    No profiles created yet.
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-light">
            <div class="card-body">
                <h5><i class="fas fa-plus-circle me-2"></i>New Profile</h5>
                <form action="{{ url_for('onboarding.new_pack') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="mb-3">
                        <label class="form-label">Profile Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g., Sales Profile" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="2"></textarea>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Create Profile</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
