{#
    Skeleton Dashboard Loader

    A loading skeleton for dashboard stat cards.

    Parameters:
    - cards: Number of stat cards to display (default: 4)

    Usage:
    {% include 'components/skeleton_dashboard.html' with cards=6 %}
#}

{% set cards = cards | default(4) %}

<div class="row" id="skeleton-dashboard-loader">
    {% for i in range(cards) %}
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="skeleton skeleton-text-sm" style="width: 100px;"></div>
                    <div class="skeleton skeleton-avatar-sm"></div>
                </div>
                <div class="skeleton skeleton-title" style="width: 80px; height: 2.5rem; margin-bottom: 0.5rem;"></div>
                <div class="skeleton skeleton-text-sm" style="width: 120px;"></div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
