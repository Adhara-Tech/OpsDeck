{% extends "layout.html" %}

{% block title %}Too Many Requests - OpsDeck{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="text-center" style="margin-top: 100px;">
        <div class="error mx-auto mb-4" style="font-size: 7rem; font-weight: 700; color: #f6c23e;">429</div>
        <p class="lead text-gray-800 mb-4">Too Many Requests</p>
        <p class="text-gray-500 mb-5">
            <i class="fas fa-hand-paper fa-3x text-warning mb-3"></i><br>
            You have exceeded the request limit.<br>
            Please wait a moment before trying again.
        </p>
        <a href="{{ url_for('risk.dashboard') }}" class="btn btn-primary">
            <i class="fas fa-home"></i> Return Home
        </a>
    </div>
</div>
{% endblock %}
