{% extends "layout.html" %}

{% set title = "Edit Budget" if budget else "New Budget" %}

{% block title %}{{ title }} - {{ super() }}{% endblock %}

{% block content %}
<h2><i class="fas fa-wallet"></i> {{ title }}</h2>
<hr>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="name" class="form-label">Name *</label>
                    <input type="text" class="form-control" id="name" name="name"
                        value="{{ budget.name if budget else '' }}" required {% if not can_write('business_ops')
                        %}disabled{% endif %}>
                </div>
                <div class="col-md-6">
                    <label for="category" class="form-label">Category</label>
                    <input type="text" class="form-control" id="category" name="category"
                        value="{{ budget.category if budget else '' }}" {% if not can_write('business_ops') %}disabled{%
                        endif %}>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="amount" class="form-label">Amount *</label>
                    <input type="number" class="form-control" id="amount" name="amount" step="0.01"
                        value="{{ budget.amount if budget else '' }}" required {% if not can_write('business_ops')
                        %}disabled{% endif %}>
                </div>
                <div class="col-md-6">
                    <label for="currency" class="form-label">Currency</label>
                    <select class="form-select" id="currency" name="currency" {% if not can_write('business_ops')
                        %}disabled{% endif %}>
                        {% set currencies = ['EUR', 'USD', 'GBP', 'ZAR'] %}
                        {% for curr in currencies %}
                        <option value="{{ curr }}" {% if budget and budget.currency==curr %}selected{% endif %}>{{ curr
                            }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="period" class="form-label">Period *</label>
                <select class="form-select" id="period" name="period" required {% if not can_write('business_ops')
                    %}disabled{% endif %}>
                    <option value="One-time" {% if budget and budget.period=='One-time' %}selected{% endif %}>One-time
                    </option>
                    <option value="monthly" {% if budget and budget.period=='monthly' %}selected{% endif %}>Monthly
                    </option>
                    <option value="yearly" {% if budget and budget.period=='yearly' %}selected{% endif %}>Yearly
                    </option>
                </select>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="valid_from" class="form-label">Valid From *</label>
                    <input type="date" class="form-control" id="valid_from" name="valid_from"
                        value="{{ budget.valid_from.strftime('%Y-%m-%d') if budget and budget.valid_from else '' }}"
                        required {% if not can_write('business_ops') %}disabled{% endif %}>
                </div>
                <div class="col-md-6">
                    <label for="valid_until" class="form-label">Valid Until *</label>
                    <input type="date" class="form-control" id="valid_until" name="valid_until"
                        value="{{ budget.valid_until.strftime('%Y-%m-%d') if budget and budget.valid_until else '' }}"
                        required {% if not can_write('business_ops') %}disabled{% endif %}>
                </div>
            </div>

            <hr>

            <div class="mt-4">
                <a href="{{ url_for('budgets.budgets') }}" class="btn btn-secondary">Cancel</a>
                {% if can_write('business_ops') %}
                <button type="submit" class="btn btn-primary">Save Budget</button>
                {% endif %}
            </div>
        </form>
    </div>
</div>
{% endblock %}
