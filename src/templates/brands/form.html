{% extends "layout.html" %}

{% set title = "Edit Brand" if brand else "New Brand" %}

{% block title %}{{ title }} - {{ super() }}{% endblock %}

{% block content %}
<h2><i class="fas fa-tag"></i> {{ title }}</h2>
<hr>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="name" class="form-label">Name *</label>
                <input type="text" class="form-control" id="name" name="name"
                    value="{{ brand.name if brand else '' }}" required maxlength="100"
                    {% if not can_write('core_inventory') %}disabled{% endif %}>
            </div>
            <div class="mb-3">
                <label for="website" class="form-label">Website</label>
                <input type="url" class="form-control" id="website" name="website"
                    value="{{ brand.website if brand else '' }}" maxlength="255"
                    placeholder="https://..."
                    {% if not can_write('core_inventory') %}disabled{% endif %}>
            </div>
            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="3"
                    {% if not can_write('core_inventory') %}disabled{% endif %}>{{ brand.notes if brand else '' }}</textarea>
            </div>
            <div class="mt-4">
                <a href="{{ url_for('brands.list_brands') }}" class="btn btn-secondary">Cancel</a>
                {% if can_write('core_inventory') %}
                <button type="submit" class="btn btn-primary">Save Brand</button>
                {% endif %}
            </div>
        </form>
    </div>
</div>
{% endblock %}
