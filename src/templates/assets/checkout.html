{% extends "layout.html" %}

{% block title %}Check Out Asset - {{ super() }}{% endblock %}

{% block content %}
<h2><i class="fas fa-sign-out-alt"></i> Check Out: {{ asset.name }}</h2>
<hr>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="user_id" class="form-label">Check Out To *</label>
                <select class="form-select" id="user_id" name="user_id" required>
                    <option value="">Select a user...</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Physical Location</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="location_mode" id="locKeep" value="keep" checked>
                    <label class="form-check-label" for="locKeep">
                        <i class="fas fa-building text-secondary"></i>
                        Stay at {{ asset.location.name if asset.location else 'Current Location' }} <small
                            class="text-muted">(e.g., Desktop in Office)</small>
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="location_mode" id="locRemote" value="remote">
                    <label class="form-check-label" for="locRemote">
                        <i class="fas fa-home text-info"></i>
                        Take away / Remote <small class="text-muted">(User's custody - laptop, home office,
                            etc.)</small>
                    </label>
                </div>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
            </div>
            <hr>
            <a href="{{ url_for('assets.asset_detail', id=asset.id) }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Check Out</button>
        </form>
    </div>
</div>
{% endblock %}
