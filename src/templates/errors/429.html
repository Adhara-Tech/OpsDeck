<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>429 - Too Many Requests | OpsDeck</title>
    <!-- FOUC Prevention -->
    <script>
        (function() {
            var theme = localStorage.getItem('opsdeck-theme') ||
                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-bs-theme', theme);
        })();
    </script>
    <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='vendor/font-awesome/css/all.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/custom.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/theme.css') }}" rel="stylesheet">
</head>

<body class="error-page-body">
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-hand-paper"></i>
        </div>
        <div class="error-code">429</div>
        <div class="error-title">Too Many Requests</div>
        <div class="error-message">
            You've exceeded the request limit.<br>
            {% if error %}
            <strong>{{ error }}</strong><br>
            {% endif %}
            Please wait a moment before trying again.
        </div>
        <div class="d-flex gap-3 justify-content-center">
            <a href="javascript:history.back()" class="btn-home" style="background: var(--bs-secondary);">
                <i class="fas fa-arrow-left me-2"></i>Go Back
            </a>
            <a href="{{ url_for('main.dashboard') }}" class="btn-home">
                <i class="fas fa-home me-2"></i>Dashboard
            </a>
        </div>
    </div>
</body>

</html>
